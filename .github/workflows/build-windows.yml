name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Evidencija prekovremenog rada v__VERSION__"
          releaseBody: |
            Windows installer za Evidenciju prekovremenog rada.
            Preuzmi .msi ili .exe i pokreni instalaciju.
          releaseDraft: true
          prerelease: false
